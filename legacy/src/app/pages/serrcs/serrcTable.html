<div class="horizontal-scroll">

  <div class="form-group select-page-size-wrap ">
    <label>Rows on page
      <select class="form-control selectpicker show-tick" title="Rows on page" ng-model="promoteTablePageSize" selectpicker ng-options="i for i in [5,10,15,20,25]">
      </select>
    </label>
  </div>

    <div>
        <pre>Check Again</pre>
        <button type="button" class="btn btn-md btn-success centre" data-toggle="modal" ng-click="open('app/pages/serrcs/model/SerrcAddModal.html', 'lg')" ng-controller="ManipulateSerrcModelCtrl">Add Serrc</button>
        <button type="button" class="btn btn-md btn-danger" data-toggle="modal" ng-click="open('app/pages/serrcs/model/SerrcDeleteModal.html', 'sm')" ng-controller="ManipulateSerrcModelCtrl">Delete Serrc</button>
    </div>

  <table class="table" st-table="ProList" st-safe-src="tableCollections" >
    <thead>
    <tr class="sortable">
      <th st-sort="promoteDate">PROMOTE DATE</th>
      <th st-sort="jiraRef">JIRA REF NO</th>
      <th st-sort="programmer">PROGRAMMER</th>
      <th st-sort="jenkinsJobId" st-sort-default="true">JENKINS JOB ID</th>
      <th st-sort="status">STATUS</th>
      <th class="text-center"> DETAILS </th>
    </tr>
    <tr>
      <th><input st-search="promoteDate" placeholder="Search Promote Date" class="input-sm form-control search-input"
                 type="search"/></th>
      <th><input st-search="jiraRef" placeholder="Search Jira Ref" class="input-sm form-control search-input"
                 type="search"/></th>
      <th><input st-search="programmer" placeholder="Search Programmer" class="input-sm form-control search-input"
                 type="search"/></th>
      <th><input st-search="jenkinsJobId" placeholder="Search Jenkins Job Id" class="input-sm form-control search-input" type="search"/>
      </th>
      <th><input st-search="status" placeholder="Search Status" class="input-sm form-control search-input" type="search"/>
      </th>
    </tr>
    </thead>
    <tbody >
    <tr ng-repeat="item in ProList">
      <td class="text-center">{{item.promoteDate}}</td>
      <td class="text-center">{{item.ticketNo}}</td>
      <td class="text-center">{{item.programmer}}</td>
      <td class="text-center">{{item.jenkinsJobId}}</td>
      <!--<td>{{item.jobStatus}}</td>-->
        <td ng-if="item.jobStatus !== 'Success'" data-toggle="tooltip" class="text-center" style="color: #cc2900;">  {{item.jobStatus}}  </td>
        <td ng-if="item.jobStatus == 'Success'" data-toggle="tooltip" class="text-center" style="color: #009900;">  {{item.jobStatus}}  </td>
    </tr>
    </tbody>
    <tfoot>
    <tr>
      <td colspan="6" class="text-center">
        <div st-pagination="" st-items-by-page="promoteTablePageSize" st-displayed-pages="5"></div>
      </td>
    </tr>
    </tfoot>
  </table>
</div>
